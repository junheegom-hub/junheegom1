name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx electron-builder --win --publish never
      - name: 결과 업로드
  uses: actions/upload-artifact@v4
  with:
    name: my-app
    path: dist/
